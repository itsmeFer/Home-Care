name: home_care
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.7.2 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  geolocator: ^14.0.2
  geocoding: ^4.0.0
  google_maps_flutter: ^2.13.1
  url_launcher: ^6.3.2
  flutter_map: ^8.2.2
  latlong2: ^0.9.1
  audioplayers: ^6.5.1
  vibration: ^3.1.4
  flutter_launcher_icons: ^0.14.4
  image_picker: ^1.2.1
  image_picker_for_web: 3.1.0
  fl_chart: ^0.68.0
  universal_io: ^2.2.2
  universal_html: ^2.2.4
  firebase_core: ^3.1.0
  firebase_messaging: ^15.0.0
  flutter_local_notifications: ^17.2.2
  firebase_auth: ^5.1.0
  device_preview: 1.2.0
  intl: ^0.20.2
  http: ^1.2.2
  shared_preferences: ^2.5.3
  flutter_secure_storage: ^10.0.0
  
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/audio/
    - assets/Icons/Navbar/

  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
        - asset: assets/fonts/Poppins-Medium.ttf
          weight: 500
        - asset: assets/fonts/Poppins-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/home_nobg.png"
  adaptive_icon_foreground: "assets/images/home_nobg.png"
  adaptive_icon_background: "#FFFFFF"
  remove_alpha_ios: true
  min_sdk_android: 21